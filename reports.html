<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reports Dashboard — Beta v10.13</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css?v=10.13" />
</head>
<body>

<div class="wrap">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:12px;">
    <div class="dropdown">
      <button class="hamburger-btn" onclick="window.toggleMenu(event)">☰</button>
      <div class="dropdown-content">
        <a href="index.html"><b>Index</b> (Dashboard)</a>
        <a href="stage.html" class="indented">↳ Staging Entries Log</a>
        <a href="ship.html" class="indented">↳ Shipped Log</a>
        <a href="reports.html"><b>Reports</b></a>
      </div>
    </div>
    <h2 style="margin:0; flex: 1 1 auto;">Reports Dashboard — Beta v10.13</h2>
    <div id="authStatus"></div>
  </div>

  <div class="card">
    <div class="split">
      <h3>Operations Reporting</h3>
    </div>
    <p style="color:#6b7280; font-size: 13px; margin-top: 0; margin-bottom: 16px;">
      Run system diagnostics and verify staging location accuracy to resolve discrepancies and keep the warehouse inventory synced.
    </p>

    <div style="display:flex; flex-direction:column; gap:12px;">
      <button class="btn" disabled style="padding:16px; font-size:16px; border: 1px solid #e5e7eb;">
        Staging Verification Report <span style="font-weight:normal; font-size:13px; margin-left:6px;">(Coming Soon)</span>
      </button>

      <button class="btn" disabled style="padding:16px; font-size:16px; border: 1px solid #e5e7eb;">
        Stage Verification Report (Aisle Locations Only) <span style="font-weight:normal; font-size:13px; margin-left:6px;">(Coming Soon)</span>
      </button>

      <button class="btn" disabled style="padding:16px; font-size:16px; border: 1px solid #e5e7eb;">
        Staging Verification Report (Shipping Locations Only) <span style="font-weight:normal; font-size:13px; margin-left:6px;">(Coming Soon)</span>
      </button>
    </div>
  </div>
</div>

<div id="loginModal" class="modal-overlay" onclick="if(event.target===this) document.querySelector('#loginModal').style.display='none'">
  <div class="modal-window" style="max-width: 350px;">
    <button class="modal-close-x" onclick="document.querySelector('#loginModal').style.display='none'">&times;</button>
    <h3 style="margin:0 0 10px 0;">Sign In</h3>
    <div class="modal-field"><label>E-mail</label><input type="email" id="login_email" autocomplete="username" placeholder="warehouse@swiftsupply.ca" /></div>
    <div class="modal-field"><label>Password</label><input type="password" id="login_password" autocomplete="current-password" placeholder="••••••••" /></div>
    <button id="loginBtn" class="btn" style="margin-top:12px; width:100%;" onclick="window.submitLogin()">Sign In</button>
  </div>
</div>

<script src="config.js?v=10.13"></script>
<script src="auth.js?v=10.13"></script>
<script src="ui.js?v=10.13"></script>
<script src="app.js?v=10.13"></script>
</body>
</html>
