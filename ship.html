<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Expanded Log — v8.2</title>
<style>
  body{margin:0;background:#fff;font:13px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#222;}
  .wrap{padding:12px}
  .actions{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  button{background:#dd4d25;color:#fff;border:0;border-radius:8px;height:32px;padding:0 12px;cursor:pointer;font-weight:700}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-edit{background:#0284c7;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  input { height: 34px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; max-width:300px; font-size:13px; }
  .table-wrap{ overflow-x: auto; border:1px solid #e5e7eb; border-radius:10px }
  table{width:100%; border-collapse:collapse; min-width:1100px}
  th,td{border-top:1px solid #e5e7eb; padding:8px; white-space:nowrap; text-align:left}
  th{position:sticky; top:0; background:#fafafa; z-index: 1;}
  .coord-link { color: #0284c7; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Shipped Expanded Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print Manifest Log</button>
    <button onclick="window.close()">Close Window</button>
    <input id="f" placeholder="Quick search..." oninput="filter()"/>
  </div>
  <div class="table-wrap"><table id="tbl">
    <thead><tr><th>Delete</th><th>Edit</th><th>SO</th><th>Customer</th><th>Containers</th><th>Carrier</th><th>Location</th><th>Coords</th><th>Total Weight (in lbs)</th><th>Shipped At</th><th>Shipped By</th><th>PM'd Email</th></tr></thead>
    <tbody></tbody>
  </table></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://gdrpdiwykmnybmkadlrv.supabase.co';
  const supabaseClient = supabase.createClient(SUPABASE_URL, 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnBkaXd5a21ueWJta2FkbHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjMyMTIsImV4cCI6MjA5NjA5OTIxMn0.Z7ih_vQic1GtzCyZmTEV-RWJnmuaNZQDfOV2_Fvan5g');
  let cache = [];

  async function refresh() {
    const res = await supabaseClient.from('shipped').select('*').order('shipped_at', { ascending: false });
    cache = res.data || []; filter();
  }

  // REVISION: Routing information up to index.html parent context to completely prevent modal layout drift
  function requestParentEdit(recordJson) {
    if (window.opener && !window.opener.closed && window.opener.triggerExternalEditor) {
      window.opener.triggerExternalEditor("shipped", recordJson);
    } else { alert("Main dashboard tab must be kept open to execute editing tasks."); }
  }

  function filter() {
    const q = document.querySelector('#f').value.toLowerCase();
    const body = document.querySelector('#tbl tbody'); body.innerHTML = '';
    cache.filter(e => e.so.toLowerCase().includes(q) || e.customer.toLowerCase().includes(q)).forEach(e => {
      const row = document.createElement('tr');
      const geoLink = e.coords ? `<a class="coord-link" href="geo:0,0?q=${encodeURIComponent(e.coords)}">${e.coords}</a>` : '—';
      const escapedJson = JSON.stringify(e).replace(/'/g, "\\'").replace(/"/g, '&quot;');
      
      row.innerHTML = `<td><button class="btn-del" onclick="deleteItem('${e.id}')">Delete</button></td>
        <td><button class="btn-edit" onclick="requestParentEdit(${escapedJson})">Edit</button></td>
        <td><b>${e.so}</b></td><td>${e.customer}</td><td>${e.type}</td><td>${e.carrier || '—'}</td><td>${e.location}</td><td><small>${geoLink}</small></td><td><b>${e.weight || '—'}</b></td><td>${new Date(e.shipped_at).toLocaleString()}</td><td>${e.shipped_by||'—'}</td><td>${e.pmd_email ? e.pmd_email+' <span class="green-check">✓</span>' : '—'}</td>`;
      body.appendChild(row);
    });
  }

  async function deleteItem(id) { if(confirm("Permanently delete record?")) { await supabaseClient.from('shipped').delete().eq('id', id); refresh(); } }
  window.onload = () => { refresh(); setInterval(refresh, 5000); };
</script>
</body>
</html>
