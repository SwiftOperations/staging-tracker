<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Log — v2.65</title>
<style>
  body{margin:0;background:#fff;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  h2{margin:0 0 10px}
  .actions{display:flex;gap:8px;margin-bottom:10px}
  button{background:#dd4d25;color:#fff;border:0;border-radius:10px;height:36px;padding:0 12px;cursor:pointer}
  .table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:10px}
  table{width:100%;border-collapse:collapse}
  th,td{border-top:1px solid #e5e7eb;padding:10px 8px;white-space:nowrap;background:#fff;text-align:left}
  th{position:sticky;top:0;background:#fafafa}
</style>
</head>
<body>
<div class="wrap">
  <h2>Completed Dispatch Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print Manifest</button>
    <button onclick="window.close()">Close</button>
  </div>
  <div class="table-wrap">
    <table id="tbl">
      <thead>
      <tr>
        <th>SO Number</th><th>Customer</th><th>Due Date</th>
        <th>Total Containers</th><th>Staging Location at Ship</th>
        <th>Status at Ship</th><th>Timestamp Logged</th>
      </tr>
      </thead>
      <tbody><tr><td colspan="7">Syncing with cloud...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
  // --- CLOUD CONFIGURATION ---
  const BIN_ID = '6a1e3ceeda38895dfe796129';
  const API_KEY = '$2a$10$3OYuGPALJgI/2VUrltTb0/hh8K6zsxERCBJVS6bgTMhlPUH96jFu';
  const CLOUD_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  window.addEventListener('DOMContentLoaded', async () => {
    const body = document.querySelector('#tbl tbody');
    try {
      const res = await fetch(CLOUD_URL, { headers: { 'X-Master-Key': API_KEY } }); 
      const json = await res.json();
      
      if (!res.ok) throw new Error(json.message);

      const data = json.record || { shipped: [] };
      
      body.innerHTML = '';
      if(data.shipped.length === 0) {
        body.innerHTML = '<tr><td colspan="7">No dispatched shipments logged yet.</td></tr>';
        return;
      }

      data.shipped.forEach(e => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><b>${e.so}</b></td><td>${e.customer}</td><td>${e.dueDate || ''}</td>
                      <td><b>${e.qty || 1}</b> ${e.type || ''}</td>
                      <td>${e.location || ''}</td><td>${e.status || ''}</td>
                      <td><b>${e.shippedAt ? new Date(e.shippedAt).toLocaleString() : ''}</b></td>`;
        body.appendChild(tr);
      });
    } catch (e) {
      body.innerHTML = `<tr><td colspan="7" style="color:#d32f2f;">Error pulling cloud manifest: ${e.message}</td></tr>`;
    }
  });
</script>
</body>
</html>
