<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Expanded Log — Beta v10.0</title>
<style>
  :root{--brand:#dd4d25;}
  body{margin:0;background:#fff;font:13px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#222;}
  .wrap{padding:12px}
  .actions{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  button{background:#dd4d25;color:#fff;border:0;border-radius:8px;height:32px;padding:0 12px;cursor:pointer;font-weight:700}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-edit{background:#0284c7;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  input { height: 34px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; max-width:300px; font-size:13px; }
  
  /* UI Disable sync for inputs and action buttons */
  input:disabled, select:disabled, button:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; border-color:#e5e7eb; }
  
  .table-wrap{ overflow-x: auto; border:1px solid #e5e7eb; border-radius:10px }
  table{width:100%; border-collapse:collapse; min-width:1100px}
  th,td{border-top:1px solid #e5e7eb; padding:8px; white-space:nowrap; text-align:left}
  th{position:sticky; top:0; background:#fafafa; z-index: 1;}
  .green-check { color: #16a34a; font-weight: bold; }
  
  input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; transform: scale(1); margin: 0; }
  
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 12px; }
  .modal-window { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; position: relative; font-family: system-ui, -apple-system, sans-serif; color: #222; }
  .modal-close-x { position: absolute; top: 12px; right: 16px; font-size: 22px; font-weight: 700; color: #6b7280; cursor: pointer; border: 0; background: none; z-index: 10; }
  .modal-field { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .modal-field label { font-size: 12px; font-weight: 700; color: #4b5563; margin-bottom: 2px; }
  .modal-field input, .modal-field select { height: 42px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 12px; font-size: 14px; background: #fff; color: #222; width: 100%; }
  
  .modal-window .freight-block { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; background: #f9fafb; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; flex: none; }
  .modal-window .counter-box { display: flex; justify-content: space-between; width: 100%; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb; }
  .modal-window .counter-box:nth-last-child(-n+2) { border-bottom: none; padding-bottom: 0; }
  .modal-window .counter-box label { font-size: 12px; font-weight: 700; color: #4b5563; }
  .modal-window .counter-box .counter-controls { display: flex; align-items: center; gap: 4px; }
  .modal-window .counter-box input { width: 40px; height: 28px; text-align: center; border-radius: 6px; font-weight: 700; border: 1px solid #cbd5e1; background: #fff; font-size: 13px; padding: 0; }
  .modal-window .counter-btn { width: 28px; height: 28px; background: #e5e7eb; border: 0; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #222; }

  .photo-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .photo-uploader { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 700; }
  .photo-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; width: 100%; }
  .photo-badge { background: #e2e8f0; font-size: 11px; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
  .photo-badge span { color: #dc2626; cursor: pointer; font-weight: bold; }

  .coord-link { color: #0284c7; text-decoration: none; font-weight: bold; }
  .coord-link:hover { text-decoration: underline; }

  /* STRICT MOBILE PORTRAIT WRAPPER PREVENTS GRID STRETCHING */
  @media (max-width: 480px) {
    .modal-window .freight-block { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<datalist id="dl_customers"></datalist>
<datalist id="dl_locations"></datalist>
<datalist id="dl_stagers"></datalist>
<datalist id="dl_pastEmails"></datalist>

<div class="wrap">
  <h2>Shipped Expanded Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print Manifest Log</button>
    <button onclick="window.close()">Close Window</button>
    <input id="q" placeholder="Quick filter contents..." oninput="renderTables()"/>
  </div>
  <div class="table-wrap"><table id="tblShipped">
    <thead><tr><th>Edit</th><th>Photo(s)</th><th>SO</th><th>Customer</th><th>Containers</th><th>Carrier</th><th>Location</th><th>Coords</th><th>Total Weight (in lbs)</th><th>Shipped At</th><th>Shipped By</th><th>PM'd Email</th></tr></thead>
    <tbody></tbody>
  </table></div>
</div>

<div id="editModal" class="modal-overlay" onclick="if(event.target===this) document.querySelector('#editModal').style.display='none'">
  <div class="modal-window">
    <button class="modal-close-x" onclick="document.querySelector('#editModal').style.display='none'">×</button>
    <h3 id="editModalTitle">Edit Record</h3>
    
    <div id="editPhotoSection" style="display:flex; flex-direction:column; gap:8px;">
      <label style="font-size:12px; font-weight:700; color:#4b5563;">Manage Freight Photos</label>
      <div class="photo-options-grid">
        <div class="photo-uploader" onclick="document.querySelector('#e_cameraFile').click()">📷 Take Live Photo
          <input type="file" id="e_cameraFile" accept="image/*" capture="environment" style="display:none" onchange="addEditPhotoBlob(this)" />
        </div>
        <div class="photo-uploader" onclick="document.querySelector('#e_uploadFile').click()">📁 File Upload
          <input type="file" id="e_uploadFile" multiple accept="image/*" style="display:none" onchange="addEditPhotoBlob(this)" />
        </div>
      </div>
      <div id="editPhotoPreviewStrip" class="photo-strip"></div>
    </div>
    
    <div class="modal-field"><label>SO#</label><input id="e_so" oninput="this.value=this.value.replace(/[^0-9]/g,'')" /></div>
    <div class="modal-field"><label>Customer</label>
      <div style="display:flex; width:100%;">
        <input id="e_cust" list="dl_customers" style="border-top-right-radius:0; border-bottom-right-radius:0; border-right:0;" />
        <button type="button" onclick="banishMemory('e_cust')" style="height:42px; width:36px; flex:none; background:#f8fafc; border:1px solid #cbd5e1; border-top-right-radius:8px; border-bottom-right-radius:8px; color:#dc2626; font-weight:bold; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
      </div>
    </div>
    
    <label style="font-size:12px; font-weight:700; color:#4b5563; margin-bottom:-4px;">Container Quantities</label>
    <div class="freight-block">
      <div class="counter-box"><label>Skids</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_skid',-1)">-</button><input id="e_skid" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_skid',1)">+</button></div></div>
      <div class="counter-box"><label>Boxes</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_box',-1)">-</button><input id="e_box" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_box',1)">+</button></div></div>
      <div class="counter-box"><label>Crates</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_crate',-1)">-</button><input id="e_crate" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_crate',1)">+</button></div></div>
      <div class="counter-box"><label>Pipe/Rod</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_pipe',-1)">-</button><input id="e_pipe" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_pipe',1)">+</button></div></div>
      <div class="counter-box"><label>Other</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_other',-1)">-</button><input id="e_other" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_other',1)">+</button></div></div>
    </div>

    <div class="modal-field"><label>Location</label>
      <div style="display:flex; width:100%;">
        <input id="e_loc" list="dl_locations" style="border-top-right-radius:0; border-bottom-right-radius:0; border-right:0;" />
        <button type="button" onclick="banishMemory('e_loc')" style="height:42px; width:36px; flex:none; background:#f8fafc; border:1px solid #cbd5e1; border-top-right-radius:8px; border-bottom-right-radius:8px; color:#dc2626; font-weight:bold; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
      </div>
    </div>
    
    <div class="modal-field"><label>Coords</label><input id="e_coords" readonly onclick="fetchBrowserGPS('e_coords')" style="background:#fafafa; cursor:pointer;" placeholder="Tap to update coordinates" /></div>
    <div class="modal-field"><label>Total Weight (in lbs)</label><input id="e_weight" /></div>
    
    <div id="editStagingFields">
      <div class="modal-field"><label>Shipping Status</label>
        <select id="e_status">
          <option>Partial</option><option>Ship Today</option><option>Ship Tomorrow</option><option>Ship On Future Date</option><option>Corp Pick (Not Consolidated)</option><option>Customer Pick-Up</option><option>Awaiting Shipping Instructions</option>
        </select>
      </div>
      <div class="modal-field"><label>Staged By</label>
        <div style="display:flex; width:100%;">
          <input id="e_staged_by" list="dl_stagers" style="border-top-right-radius:0; border-bottom-right-radius:0; border-right:0;" />
          <button type="button" onclick="banishMemory('e_staged_by')" style="height:42px; width:36px; flex:none; background:#f8fafc; border:1px solid #cbd5e1; border-top-right-radius:8px; border-bottom-right-radius:8px; color:#dc2626; font-weight:bold; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
        </div>
      </div>
    </div>
    
    <div id="editShippedFields" style="display:none;">
      <div class="modal-field"><label>Carrier</label><input id="e_carrier" /></div>
      <div class="modal-field"><label>Shipped By</label>
        <div style="display:flex; width:100%;">
          <input id="e_shipped_by" list="dl_stagers" style="border-top-right-radius:0; border-bottom-right-radius:0; border-right:0;" />
          <button type="button" onclick="banishMemory('e_shipped_by')" style="height:42px; width:36px; flex:none; background:#f8fafc; border:1px solid #cbd5e1; border-top-right-radius:8px; border-bottom-right-radius:8px; color:#dc2626; font-weight:bold; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
        </div>
      </div>
      <div class="modal-field"><label>PM Verified Shortname</label>
        <div style="display:flex; width:100%;">
          <input id="e_pm" list="dl_pastEmails" style="border-top-right-radius:0; border-bottom-right-radius:0; border-right:0;" />
          <button type="button" onclick="banishMemory('e_pm')" style="height:42px; width:36px; flex:none; background:#f8fafc; border:1px solid #cbd5e1; border-top-right-radius:8px; border-bottom-right-radius:8px; color:#dc2626; font-weight:bold; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
        </div>
      </div>
    </div>

    <div class="modal-actions" style="justify-content: space-between; width:100%; margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
      <span style="display:flex; gap:8px; flex-wrap: wrap;">
        <button id="editDelBtn" class="btn" style="background:#dc2626; padding: 10px 16px; border-radius: 8px; border: 0; color: #fff; font-weight: 700; cursor: pointer;" onclick="deleteCurrentRecord()">Delete</button>
        <button id="editUndoBtn" class="btn" style="background:#4b5563; padding: 10px 16px; border-radius: 8px; border: 0; color: #fff; font-weight: 700; cursor: pointer;" onclick="executeShippedUndo()">Undo Shipment Action</button>
        <button id="editReturnBtn" class="btn" style="background:#eab308; color:#222; padding: 10px 16px; border-radius: 8px; border: 0; font-weight:700; cursor:pointer;" onclick="triggerReturnModal()">Return to Stock</button>
        <button id="editConsolidateBtn" class="btn" style="background:#8b5cf6; color:#fff; padding: 10px 16px; border-radius: 8px; border: 0; font-weight:700; cursor:pointer;" onclick="executeConsolidate()">Consolidated</button>
      </span>
      <span style="display:flex; gap:8px; margin-left:auto; flex-wrap: wrap;">
        <button class="btn" style="background:#9ca3af; border-radius: 8px; padding: 10px 16px; border: 0; color:#fff; font-weight:700; cursor:pointer;" onclick="document.querySelector('#editModal').style.display='none'">Cancel</button>
        <button id="editSaveBtn" class="btn" style="background:#e04f26; border-radius: 8px; padding: 10px 16px; border: 0; color:#fff; font-weight:700; cursor:pointer;" onclick="saveEditedRecord()">Save Changes</button>
      </span>
    </div>
  </div>
</div>

<div id="viewModal" class="modal-overlay" onclick="if(event.target===this) document.querySelector('#viewModal').style.display='none'">
  <div class="modal-window" style="max-width: 500px;">
    <button class="modal-close-x" onclick="document.querySelector('#viewModal').style.display='none'">×</button>
    <h3 style="margin:0 0 10px 0;">Staged Freight Photos</h3>
    <div id="modalPhotoGallery" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; padding: 4px 0;"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gdrpdiwykmnybmkadlrv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnBkaXd5a21ueWJta2FkbHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjMyMTIsImV4cCI6MjA5NjA5OTIxMn0.Z7ih_vQic1GtzCyZmTEV-RWJnmuaNZQDfOV2_Fvan5g';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = sel => document.querySelector(sel);

let appData = { staging: [], shipped: [] };
let activeShipTargetItem = null;
let currentEditId = null;
let editTargetRecord = { table: null, id: null, photo_urls: [] };
let selectedPhotoBlobs = [];
let mainPhotoBlobs = [];
let openMapInstance = null;
let openMapMarkers = [];
let hiddenMemory = JSON.parse(localStorage.getItem('swift_hidden_memory') || '[]');

function bootstrapStandalonePWA() {
  const pwaData = {
    "short_name": "StagingTracker",
    "name": "Swift Staging Tracker Hub",
    "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/3014/3014166.png", "type": "image/png", "sizes": "512x512"}],
    "start_url": window.location.href,
    "background_color": "#f6f7f9",
    "theme_color": "#dd4d25",
    "display": "standalone",
    "orientation": "portrait"
  };
  if($('#pwa-manifest')) $('#pwa-manifest').setAttribute('href', 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(pwaData)));
}

function adjustCount(id, amt) {
  if(!$('#'+id)) return;
  $('#'+id).value = Math.max(0, (parseInt($('#'+id).value)||0) + amt);
}
function adjustEditCount(id, amt) {
  if(!$('#'+id)) return;
  $('#'+id).value = Math.max(0, (parseInt($('#'+id).value)||0) + amt);
}

function formatContainer(count, type) {
  if(!count || count === 0) return '';
  if(count === 1) return `1 ${type}`;
  if(type === 'Box') return `${count} Boxes`;
  if(type === 'Pipe/Rod' || type === 'Other') return `${count} ${type}`;
  return `${count} ${type}s`;
}

function fetchBrowserGPS(targetInputId) {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => { if($('#'+targetInputId)) $('#'+targetInputId).value = position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6); },
      (error) => { alert("GPS Tracking Denied: " + error.message); }
    );
  }
}

function initOpenStreetMapEngine() {
  if(!$('#openFreightMap')) return;
  openMapInstance = L.map('openFreightMap').setView([53.5461, -113.4938], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(openMapInstance);
  syncMapPins();
}

function syncMapPins() {
  if (!openMapInstance) return;
  openMapMarkers.forEach(m => openMapInstance.removeLayer(m));
  openMapMarkers = [];
  let pointsForBoundFocus = [];

  appData.staging.forEach(item => {
    if (!item.coords || !item.coords.includes(',')) return;
    const segments = item.coords.split(',');
    const latVal = parseFloat(segments[0].trim());
    const lngVal = parseFloat(segments[1].trim());
    
    if (!isNaN(latVal) && !isNaN(lngVal)) {
      const marker = L.marker([latVal, lngVal]).addTo(openMapInstance);
      marker.on('click', () => { openStaticMapPromptWindow(item); });
      openMapMarkers.push(marker);
      pointsForBoundFocus.push([latVal, lngVal]);
    }
  });

  if (pointsForBoundFocus.length === 1) {
    openMapInstance.setView(pointsForBoundFocus[0], 18);
  } else if (pointsForBoundFocus.length > 1) {
    openMapInstance.fitBounds(L.latLngBounds(pointsForBoundFocus), { padding: [5, 5], maxZoom: 18 });
  }
}

function openStaticMapPromptWindow(item) {
  if(!$('#mapViewModal')) return;
  $('#v_so').value = item.so; $('#v_cust').value = item.customer; $('#v_date').value = new Date(item.entry_date).toLocaleString();
  $('#v_type').value = item.type || '—'; $('#v_loc').value = item.location || '—'; $('#v_coords').value = item.coords || '—';
  $('#v_weight').value = item.weight || '—'; $('#v_status').value = item.status || '—'; $('#v_staged_by').value = item.staged_by || '—';
  
  const gallery = $('#mapViewGalleryStrip');
  if(gallery) {
    gallery.innerHTML = '';
    if (item.photo_urls && item.photo_urls.length > 0) {
      $('#mapViewPhotoSection').style.display = 'flex';
      item.photo_urls.forEach(path => {
        gallery.insertAdjacentHTML('beforeend', `<a href="${SUPABASE_URL}/storage/v1/object/public/freight-photos/${path}" target="_blank"><img src="${SUPABASE_URL}/storage/v1/object/public/freight-photos/${path}" style="width:70px; height:70px; object-fit:cover; border-radius:6px; border:1px solid #ddd;"/></a>`);
      });
    } else {
      $('#mapViewPhotoSection').style.display = 'none';
    }
  }
  $('#mapViewModal').style.display = 'flex';
}

function banishMemory(inputId) {
  if(!$('#'+inputId)) return;
  const val = $('#'+inputId).value.trim();
  if(!val) return;
  if(confirm(`Remove "${val}" from autocomplete memory?`)) {
    if(!hiddenMemory.includes(val)) {
      hiddenMemory.push(val);
      localStorage.setItem('swift_hidden_memory', JSON.stringify(hiddenMemory));
    }
    $('#'+inputId).value = '';
    loadCloudData();
  }
}

async function loadCloudData() {
  const [st, sh] = await Promise.all([
    supabaseClient.from('staging').select('*').order('entry_date', { ascending: false }),
    supabaseClient.from('shipped').select('*').order('shipped_at', { ascending: false })
  ]);
  appData.staging = st.data || []; 
  appData.shipped = sh.data || [];
  
  const allData = [...appData.staging, ...appData.shipped];
  const filterMem = (arr) => [...new Set(arr.filter(Boolean))].filter(x => !hiddenMemory.includes(x));

  if($('#dl_customers')) $('#dl_customers').innerHTML = filterMem(allData.map(x=>x.customer)).map(c=>`<option value="${c}">`).join('');
  if($('#dl_locations')) $('#dl_locations').innerHTML = filterMem(allData.map(x=>x.location)).map(l=>`<option value="${l}">`).join('');
  if($('#dl_stagers')) $('#dl_stagers').innerHTML = filterMem(allData.map(x=>(x.staged_by || x.shipped_by))).map(s=>`<option value="${s}">`).join('');
  if($('#dl_pastEmails')) $('#dl_pastEmails').innerHTML = filterMem(appData.shipped.map(x=>x.pmd_email)).map(em=>`<option value="${em}@swiftsupply.ca">`).join('');
  
  renderTables(); 
  if(typeof syncMapPins === 'function') syncMapPins();
}

function triggerShipModal(id) {
  const item = appData.staging.find(x => x.id === id);
  if (!item) return;
  activeShipTargetItem = item; 
  if($('#photoPreviewStrip')) $('#photoPreviewStrip').innerHTML = ''; 
  selectedPhotoBlobs = [];
  
  if($('#m_so')) $('#m_so').value = item.so; 
  if($('#m_cust')) $('#m_cust').value = item.customer; 
  if($('#m_qty')) $('#m_qty').value = item.type;
  if($('#m_carrier')) $('#m_carrier').value = ''; 
  if($('#m_loc')) $('#m_loc').value = item.location; 
  if($('#m_weight')) $('#m_weight').value = item.weight || '—'; 
  if($('#m_by')) $('#m_by').value = '';
  
  if($('#m_pm_chk')) $('#m_pm_chk').checked = false; 
  if($('#m_pm_email')) $('#m_pm_email').disabled = true; 
  if($('#m_pm_email_btn')) $('#m_pm_email_btn').disabled = true;
  if($('#shipModal')) $('#shipModal').style.display = 'flex';
}
function closeShipModal() { if($('#shipModal')) $('#shipModal').style.display = 'none'; loadCloudData(); }

function addMainPhotoBlob(inputEl) {
  if(!inputEl.files || inputEl.files.length === 0) return;
  Array.from(inputEl.files).forEach(f => { if(mainPhotoBlobs.length < 10) mainPhotoBlobs.push(f); });
  renderMainPhotoStrip();
}
function renderMainPhotoStrip() {
  const container = $('#mainPhotoPreviewStrip'); 
  if(!container) return;
  container.innerHTML = '';
  mainPhotoBlobs.forEach((f, idx) => {
    container.insertAdjacentHTML('beforeend', `<span class="photo-badge">📎 Img-${idx+1} <span onclick="mainPhotoBlobs.splice(${idx},1); renderMainPhotoStrip()">×</span></span>`);
  });
}

function addPhotoBlob(inputEl) {
  if(!inputEl.files || inputEl.files.length === 0) return;
  Array.from(inputEl.files).forEach(f => { if(selectedPhotoBlobs.length < 10) selectedPhotoBlobs.push(f); });
  renderPhotoStrip('#photoPreviewStrip', selectedPhotoBlobs);
}

function addEditPhotoBlob(inputEl) {

function parseContainerString(typeStr) {
  let sk = 0, bx = 0, cr = 0, pi = 0, ot = 0; if(!typeStr) return { sk, bx, cr, pi, ot };
  const matchSk = typeStr.match(/(\d+)\s*Skid/); if(matchSk) sk = parseInt(matchSk[1]);
  const matchBx = typeStr.match(/(\d+)\s*Box/);  if(matchBx) bx = parseInt(matchBx[1]);
  const matchCr = typeStr.match(/(\d+)\s*Crate/);if(matchCr) cr = parseInt(matchCr[1]);
  const matchPi = typeStr.match(/(\d+)\s*Pipe\/Rod/);if(matchPi) pi = parseInt(matchPi[1]);
  const matchOt = typeStr.match(/(\d+)\s*Other/);if(matchOt) ot = parseInt(matchOt[1]);
  return { sk, bx, cr, pi, ot };
}

function getDynamicType(prefix) {
  const sk = parseInt($(`#${prefix}_skid`) ? $(`#${prefix}_skid`).value : 0)||0;
  const bx = parseInt($(`#${prefix}_box`) ? $(`#${prefix}_box`).value : 0)||0;
  const cr = parseInt($(`#${prefix}_crate`) ? $(`#${prefix}_crate`).value : 0)||0;
  const pi = parseInt($(`#${prefix}_pipe`) ? $(`#${prefix}_pipe`).value : 0)||0;
  const ot = parseInt($(`#${prefix}_other`) ? $(`#${prefix}_other`).value : 0)||0;
  let typeParts = []; 
  if(sk) typeParts.push(formatContainer(sk, 'Skid'));
  if(bx) typeParts.push(formatContainer(bx, 'Box'));
  if(cr) typeParts.push(formatContainer(cr, 'Crate'));
  if(pi) typeParts.push(formatContainer(pi, 'Pipe/Rod'));
  if(ot) typeParts.push(formatContainer(ot, 'Other'));
  return typeParts.join(', ') || '1 Skid';
}
function getDynamicQty(prefix) {
  const sk = parseInt($(`#${prefix}_skid`) ? $(`#${prefix}_skid`).value : 0)||0;
  const bx = parseInt($(`#${prefix}_box`) ? $(`#${prefix}_box`).value : 0)||0;
  const cr = parseInt($(`#${prefix}_crate`) ? $(`#${prefix}_crate`).value : 0)||0;
  const pi = parseInt($(`#${prefix}_pipe`) ? $(`#${prefix}_pipe`).value : 0)||0;
  const ot = parseInt($(`#${prefix}_other`) ? $(`#${prefix}_other`).value : 0)||0;
  return sk+bx+cr+pi+ot;
}

        $('#add').disabled = false; $('#add').textContent = 'Add'; return;
      }
      
      $('#so').value=''; $('#customer').value=''; $('#loc').value=''; $('#coords').value=''; $('#staged_by').value=''; $('#weight').value=''; $('#c_skid').value=0; $('#c_box').value=0; $('#c_crate').value=0; $('#c_pipe').value=0; $('#c_other').value=0; 
      mainPhotoBlobs = []; renderMainPhotoStrip();
      loadCloudData();
    } catch(e) { alert("System Error: " + e.message); }
    
    $('#add').disabled = false;
    $('#add').textContent = 'Add';
  };
}

if($('#q')) $('#q').oninput = renderTables;
if($('#expandStaging')) $('#expandStaging').onclick = () => window.open('stage.html', '_blank');
if($('#expandShipped')) $('#expandShipped').onclick = () => window.open('ship.html', '_blank');

window.onload = () => { bootstrapStandalonePWA(); initOpenStreetMapEngine(); loadCloudData(); setInterval(loadCloudData, 5000); };
</script>
</body>
