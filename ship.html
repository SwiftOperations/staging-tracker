<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Log — v5.1</title>
<style>
  body{margin:0;background:#fff;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  h2{margin:0 0 10px}
  .actions{display:flex;gap:8px;margin-bottom:10px}
  button{background:#dd4d25;color:#fff;border:0;border-radius:10px;height:36px;padding:0 12px;cursor:pointer}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-del:hover{background:#b91c1c}
  
  .table-wrap{
    overflow-x: auto;
    border:1px solid #e5e7eb;
    border-radius:10px
  }
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  
  table{width:100%;border-collapse:collapse}
  th,td{border-top:1px solid #e5e7eb;padding:10px 8px;white-space:nowrap;background:#fff;text-align:left}
  th{position:sticky;top:0;background:#fafafa;z-index: 1;}
</style>
</head>
<body>
<div class="wrap">
  <h2>Shipped Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
  </div>
  <div class="table-wrap">
    <table id="tbl">
      <thead>
      <tr>
        <th style="width:50px">Delete</th>
        <th>SO</th><th>Customer</th><th>Entry Date</th>
        <th>Number of Containers</th><th>Staging Location(s) at Ship</th>
        <th>Status at Ship</th><th>Shipped At</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const BIN_ID = '6a1e4f2ef5f4af5e29ab1884';
  const API_KEY = '$2a$10$friXAeZCMSMRSgzX3QaNAOpc09/c3syit6s04pV1iaZO3KHqeyO9y';
  const CLOUD_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  let currentRecordData = [];

  async function pushCloudSyncUpdate() {
    try {
      await fetch(CLOUD_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Access-Key': API_KEY },
        body: JSON.stringify(currentRecordData)
      });
      refreshShippedView();
    } catch (e) {
      console.error("Cloud mutation broadway rejection.");
    }
  }

  async function refreshShippedView() {
    const body = document.querySelector('#tbl tbody');
    try {
      const res = await fetch(`${CLOUD_URL}/latest`, {
        method: 'GET',
        headers: { 'X-Access-Key': API_KEY },
        cache: 'no-store'
      });
      const json = await res.json();
      currentRecordData = json.record || { staging: [], shipped: [] };
      
      body.innerHTML = '';
      if (!currentRecordData.shipped || currentRecordData.shipped.length === 0) {
        body.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#667085;padding:20px;">No historical manifest records logged yet.</td></tr>';
        return;
      }

      currentRecordData.shipped.forEach(e => {
        const tr = document.createElement('tr');
        
        // Front-positioned execution matching index mechanics
        const delTd = document.createElement('td');
        const delBtn = document.createElement('button'); delBtn.className = 'btn-del'; delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', async () => {
          if(confirm(`Permanently delete historical record for SO ${e.so}?`)) {
            const exactIndex = currentRecordData.shipped.indexOf(e);
            if (exactIndex > -1) {
              currentRecordData.shipped.splice(exactIndex, 1);
              await pushCloudSyncUpdate();
            }
          }
        });
        delTd.appendChild(delBtn); tr.appendChild(delTd);

        const entryTime = e.entryDate ? new Date(e.entryDate).toLocaleString() : (e.dueDate || '');
        const timeStr = e.shippedAt ? new Date(e.shippedAt).toLocaleString() : '';
        
        const tdFields = `<td><b>${e.so}</b></td><td>${e.customer}</td><td>${entryTime}</td>
                      <td>${e.qty || 1} ${e.type || ''}</td>
                      <td>${e.location || ''}</td><td>${e.status || ''}</td>
                      <td>${timeStr}</td>`;
        tr.insertAdjacentHTML('beforeend', tdFields);
        body.appendChild(tr);
      });
    } catch (e) {
      body.innerHTML = '<tr><td colspan="8" style="color:#dd4d25;text-align:center;">Sync error reading cloud manifest.</td></tr>';
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    refreshShippedView();
    setInterval(refreshShippedView, 10000);
  });
</script>
</body>
</html>
