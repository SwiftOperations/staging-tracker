<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Log — v2.65</title>
<style>
  body{margin:0;background:#fff;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  h2{margin:0 0 10px}
  .actions{display:flex;gap:8px;margin-bottom:10px}
  button{background:#dd4d25;color:#fff;border:0;border-radius:10px;height:36px;padding:0 12px;cursor:pointer}
  .table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:10px}
  table{width:100%;border-collapse:collapse}
  th,td{border-top:1px solid #e5e7eb;padding:10px 8px;white-space:nowrap;background:#fff;text-align:left}
  th{position:sticky;top:0;background:#fafafa}
</style>
</head>
<body>
<div class="wrap">
  <h2>Shipped Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
  </div>
  <div class="table-wrap">
    <table id="tbl">
      <thead>
      <tr>
        <th>SO</th><th>Customer</th><th>Due Date</th>
        <th>Number of Containers</th><th>Staging Location(s) at Ship</th>
        <th>Status at Ship</th><th>Shipped At</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const data = JSON.parse(localStorage.getItem('swiftStagingData')) || { shipped: [] };
    const body = document.querySelector('#tbl tbody');
    
    data.shipped.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><b>${e.so}</b></td><td>${e.customer}</td><td>${e.dueDate || ''}</td>
                    <td>${e.qty || 1} ${e.type || ''}</td>
                    <td>${e.location || ''}</td><td>${e.status || ''}</td>
                    <td>${e.shippedAt ? new Date(e.shippedAt).toLocaleString() : ''}</td>`;
      body.appendChild(tr);
    });
  });
</script>
</body>
</html>
