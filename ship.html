<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipped Log — v7.1</title>
<style>
  body{margin:0;background:#fff;font:13px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#222;}
  .wrap{padding:12px}
  .actions{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  button{background:#dd4d25;color:#fff;border:0;border-radius:8px;height:32px;padding:0 12px;cursor:pointer;font-weight:700}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-edit{background:#0284c7;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  input { height: 34px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; max-width:300px; font-size:13px; }
  .table-wrap{ overflow-x: auto; border:1px solid #e5e7eb; border-radius:10px }
  table{width:100%; border-collapse:collapse; min-width:1100px}
  th,td{border-top:1px solid #e5e7eb; padding:8px; white-space:nowrap; text-align:left}
  th{position:sticky; top:0; background:#fafafa; z-index: 1;}
  .green-check { color: #16a34a; font-weight: bold; }
  
  /* MODALS */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 12px; }
  .modal-window { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; position: relative; }
  .modal-close-x { position: absolute; top: 12px; right: 16px; font-size: 22px; font-weight: 700; color: #6b7280; cursor: pointer; border: 0; background: none; }
  .modal-field { display: flex; flex-direction: column; gap: 2px; }
  .modal-field label { font-size: 12px; font-weight: 700; color: #4b5563; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Shipped Log Historical Manifest</h2>
  <div class="actions">
    <button onclick="window.print()">Print Manifest Log</button>
    <button onclick="window.close()">Close Window</button>
    <input id="f" placeholder="Quick filter contents..." oninput="filter()"/>
  </div>
  <div class="table-wrap"><table id="tbl">
    <thead><tr><th>Delete</th><th>Edit</th><th>SO</th><th>Customer</th><th>Containers</th><th>Location</th><th>Total Weight</th><th>Shipped At</th><th>Shipped By</th><th>PM'd Email</th></tr></thead>
    <tbody></tbody>
  </table></div>
</div>

<div id="editModal" class="modal-overlay" onclick="if(event.target===this) document.querySelector('#editModal').style.display='none'">
  <div class="modal-window">
    <button class="modal-close-x" onclick="document.querySelector('#editModal').style.display='none'">×</button>
    <h3>Edit Shipped Entry</h3>
    <div class="modal-field"><label>SO#</label><input id="e_so" /></div>
    <div class="modal-field"><label>Customer</label><input id="e_cust" /></div>
    <div class="modal-field"><label>Location</label><input id="e_loc" /></div>
    <div class="modal-field"><label>Total Weight</label><input id="e_weight" /></div>
    <div class="modal-field"><label>Shipped By</label><input id="e_shipped_by" /></div>
    <div class="modal-field"><label>PM Shortname</label><input id="e_pm" /></div>
    <div class="actions" style="justify-content: space-between; margin-top:8px;">
      <button style="background:#4b5563" onclick="executeUndo()">Undo Shipment Action</button>
      <button onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient('https://gdrpdiwykmnybmkadlrv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnBkaXd5a21ueWJta2FkbHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjMyMTIsImV4cCI6MjA5NjA5OTIxMn0.Z7ih_vQic1GtzCyZmTEV-RWJnmuaNZQDfOV2_Fvan5g');
  let cache = [];
  let currentEditRecord = null;

  async function refresh() {
    const res = await supabaseClient.from('shipped').select('*').order('shipped_at', { ascending: false });
    cache = res.data || []; filter();
  }

  function filter() {
    const q = document.querySelector('#f').value.toLowerCase();
    const body = document.querySelector('#tbl tbody'); body.innerHTML = '';
    cache.filter(e => e.so.toLowerCase().includes(q) || e.customer.toLowerCase().includes(q)).forEach(e => {
      const row = document.createElement('tr');
      row.innerHTML = `<td><button class="btn-del" onclick="deleteItem('${e.id}')">Delete</button></td>
        <td><button class="btn-edit" onclick='openEditor(${JSON.stringify(e).replace(/"/g, '&quot;')})'>Edit</button></td>
        <td><b>${e.so}</b></td><td>${e.customer}</td><td>${e.type}</td><td>${e.location}</td><td><b>${e.weight || '—'}</b></td>
        <td>${new Date(e.shipped_at).toLocaleString()}</td><td>${e.shipped_by||'—'}</td>
        <td>${e.pmd_email ? e.pmd_email+' <span class="green-check">✓</span>' : '—'}</td>`;
      body.appendChild(row);
    });
  }

  async function deleteItem(id) { if(confirm("Permanently delete record?")) { await supabaseClient.from('shipped').delete().eq('id', id); refresh(); } }

  function openEditor(e) {
    currentEditRecord = e;
    document.querySelector('#e_so').value = e.so; document.querySelector('#e_cust').value = e.customer;
    document.querySelector('#e_loc').value = e.location; document.querySelector('#e_weight').value = e.weight || '';
    document.querySelector('#e_shipped_by').value = e.shipped_by || ''; document.querySelector('#e_pm').value = e.pmd_email || '';
    document.querySelector('#editModal').style.display = 'flex';
  }

  async function saveEdit() {
    await supabaseClient.from('shipped').update({
      so: document.querySelector('#e_so').value.trim(), customer: document.querySelector('#e_cust').value.trim(),
      location: document.querySelector('#e_loc').value.trim(), weight: document.querySelector('#e_weight').value.trim(),
      shipped_by: document.querySelector('#e_shipped_by').value.trim(), pmd_email: document.querySelector('#e_pm').value.trim() || null
    }).eq('id', currentEditRecord.id);
    document.querySelector('#editModal').style.display = 'none';
    refresh();
  }

  async function executeUndo() {
    if(!confirm("Undo shipment action?")) return;
    await supabaseClient.from('staging').insert([{
      so: currentEditRecord.so, customer: currentEditRecord.customer, type: currentEditRecord.type,
      qty: currentEditRecord.qty, location: currentEditRecord.location, weight: currentEditRecord.weight, status: 'Partial'
    }]);
    await supabaseClient.from('shipped').delete().eq('id', currentEditRecord.id);
    document.querySelector('#editModal').style.display = 'none';
    refresh();
  }

  window.onload = refresh; setInterval(refresh, 10000);
</script>
</body>
</html>
