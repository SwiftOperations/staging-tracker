<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staging Log — v5.0</title>
<style>
  body{margin:0;background:#fff;font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  h2{margin:0 0 10px}
  .actions{display:flex;gap:8px;margin-bottom:10px}
  button{background:#dd4d25;color:#fff;border:0;border-radius:10px;height:36px;padding:0 12px;cursor:pointer}
  
  .table-wrap{
    overflow-x: auto;
    border:1px solid #e5e7eb;
    border-radius:10px
  }
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  
  table{width:100%;border-collapse:collapse}
  th,td{border-top:1px solid #e5e7eb;padding:10px 8px;white-space:nowrap;background:#fff;text-align:left}
  th{position:sticky;top:0;background:#fafafa;z-index: 1;}
</style>
</head>
<body>
<div class="wrap">
  <h2>Staging Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
  </div>
  <div class="table-wrap">
    <table id="tbl">
      <thead>
      <tr>
        <th>SO</th><th>Customer</th><th>Entry Date</th>
        <th>Number of Containers</th><th>Staging Location(s)</th><th>Shipping Status</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const BIN_ID = '6a1e4f2ef5f4af5e29ab1884';
  const API_KEY = '$2a$10$friXAeZCMSMRSgzX3QaNAOpc09/c3syit6s04pV1iaZO3KHqeyO9y';
  const CLOUD_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  async function refreshStagingView() {
    const body = document.querySelector('#tbl tbody');
    try {
      const res = await fetch(`${CLOUD_URL}/latest`, {
        method: 'GET',
        headers: { 'X-Access-Key': API_KEY },
        cache: 'no-store'
      });
      const json = await res.json();
      const data = json.record || { staging: [] };
      
      body.innerHTML = '';
      if (!data.staging || data.staging.length === 0) {
        body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#667085;padding:20px;">No active entries staged on floor.</td></tr>';
        return;
      }

      data.staging.forEach(e => {
        const tr = document.createElement('tr');
        // REVISION 2: Replaced Due Date logic with automated locale time structure formatting matching master log
        const entryTime = e.entryDate ? new Date(e.entryDate).toLocaleString() : (e.dueDate || '');
        tr.innerHTML = `<td><b>${e.so}</b></td><td>${e.customer}</td><td>${entryTime}</td>
                      <td>${e.qty || 1} ${e.type || ''}</td>
                      <td>${e.location || ''}</td><td>${e.status || ''}</td>`;
        body.appendChild(tr);
      });
    } catch (e) {
      body.innerHTML = '<tr><td colspan="6" style="color:#dd4d25;text-align:center;">Sync error reading cloud manifest.</td></tr>';
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    refreshStagingView();
    setInterval(refreshStagingView, 10000);
  });
</script>
</body>
</html>
