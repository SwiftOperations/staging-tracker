<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staging Entries Expanded Log — v8.7</title>
<style>
  :root{--brand:#dd4d25;}
  body{margin:0;background:#fff;font:13px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#222;}
  .wrap{padding:12px}
  .actions{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  button{background:#dd4d25;color:#fff;border:0;border-radius:8px;height:32px;padding:0 12px;cursor:pointer;font-weight:700}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-edit{background:#0284c7;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  input { height: 34px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; max-width:300px; font-size:13px; }
  .table-wrap{ overflow-x: auto; border:1px solid #e5e7eb; border-radius:10px }
  table{width:100%; border-collapse:collapse; min-width:1150px}
  th,td{border-top:1px solid #e5e7eb; padding:8px; white-space:nowrap; text-align:left}
  th{position:sticky; top:0; background:#fafafa; z-index: 1;}
  th[style*="position:sticky"], td[style*="position:sticky"] { background: #fff !important; position: sticky !important; right: 0 !important; z-index: 3; box-shadow: -2px 0 5px rgba(0,0,0,0.04); }
  
  /* MASTER SYMMETRICAL MODAL BLUEPRINT MATCHING DASHBOARD DEFINITIONS PERFECTLY */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 12px; }
  .modal-window { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; position: relative; font-family: system-ui, -apple-system, sans-serif; color: #222; }
  .modal-close-x { position: absolute; top: 12px; right: 16px; font-size: 22px; font-weight: 700; color: #6b7280; cursor: pointer; border: 0; background: none; z-index: 10; }
  .modal-field { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .modal-field label { font-size: 12px; font-weight: 700; color: #4b5563; margin-bottom: 2px; }
  .modal-field input, .modal-field select { height: 42px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 12px; font-size: 14px; background: #fff; color: #222; width: 100%; }
  
  .modal-window .freight-block { flex: none; display: flex; flex-direction: column; gap: 12px; background: #fff; border: 1px solid #cbd5e1; padding: 12px; border-radius: 10px; width: 100%; }
  .modal-window .counter-box { display: flex; align-items: center; justify-content: space-between; width: 100%; border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; }
  .modal-window .counter-box:last-child { border-bottom: 0; padding-bottom: 0; }
  .modal-window .counter-box label { font-size: 13px; font-weight: 700; color: #4b5563; }
  .modal-window .counter-box .counter-controls { display: flex; align-items: center; gap: 6px; }
  .modal-window .counter-box input { width: 48px; height: 32px; text-align: center; border-radius: 6px; font-weight: 700; border: 1px solid #cbd5e1; background: #fff; }
  .modal-window .counter-btn { width: 32px; height: 32px; background: #e5e7eb; border: 0; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #222; }
  .photo-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .photo-uploader { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 700; }
  .photo-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .photo-badge { background: #e2e8f0; font-size: 11px; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
  .chk-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }

  .coord-link { color: #0284c7; text-decoration: none; font-weight: bold; }
  .coord-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Staging Entries Expanded Log</h2>
  <div class="actions">
    <button onclick="window.print()">Print Log</button>
    <button onclick="window.close()">Close Window</button>
    <input id="f" placeholder="Quick filter contents..." oninput="filter()"/>
  </div>
  <div class="table-wrap"><table id="tbl">
    <thead><tr><th>Delete</th><th>Edit</th><th>SO</th><th>Customer</th><th>Entry Date</th><th>Containers</th><th>Location</th><th>Coords</th><th>Total Weight (in lbs)</th><th>Status</th><th>Staged By</th><th style="position:sticky;right:0;width:70px;text-align:center;">Shipped</th></tr></thead>
    <tbody></tbody>
  </table></div>
</div>

<div id="editModal" class="modal-overlay" onclick="if(event.target===this) document.querySelector('#editModal').style.display='none'">
  <div class="modal-window">
    <button class="modal-close-x" onclick="document.querySelector('#editModal').style.display='none'">×</button>
    <h3>Edit Staging Entry</h3>
    <div class="modal-field"><label>SO#</label><input id="e_so" /></div>
    <div class="modal-field"><label>Customer</label><input id="e_cust" /></div>
    
    <label style="font-size:12px; font-weight:700; color:#4b5563; margin-bottom:-4px; text-align: left;">Container Quantities</label>
    <div class="freight-block">
      <div class="counter-box"><label>Skids</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_skid',-1)">-</button><input id="e_skid" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_skid',1)">+</button></div></div>
      <div class="counter-box"><label>Boxes</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_box',-1)">-</button><input id="e_box" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_box',1)">+</button></div></div>
      <div class="counter-box"><label>Crates</label><div class="counter-controls"><button class="counter-btn" onclick="adjustEditCount('e_crate',-1)">-</button><input id="e_crate" value="0" readonly/><button class="counter-btn" onclick="adjustEditCount('e_crate',1)">+</button></div></div>
    </div>

    <div class="modal-field"><label>Location</label><input id="e_loc" /></div>
    <div class="modal-field"><label>Coords</label><input id="e_coords" readonly onclick="fetchBrowserGPS('e_coords')" style="background:#fafafa; cursor:pointer;" /></div>
    <div class="modal-field"><label>Total Weight (in lbs)</label><input id="e_weight" /></div>
    <div class="modal-field"><label>Shipping Status</label>
      <select id="e_status">
        <option>Partial</option><option>Ship Today</option><option>Ship Tomorrow</option><option>Ship On Future Date</option><option>Corp Pick (Not Consolidated)</option><option>Awaiting Shipping Instructions</option>
      </select>
    </div>
    <div class="modal-field"><label>Staged By</label><input id="e_staged_by" /></div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
      <button style="background:#9ca3af; border-radius: 8px; padding: 10px 16px; border: 0; color:#fff; font-weight:700; cursor:pointer;" onclick="document.querySelector('#editModal').style.display='none'">Cancel</button>
      <button style="background:#e04f26; border-radius: 8px; padding: 10px 16px; border: 0; color:#fff; font-weight:700; cursor:pointer;" onclick="saveEditedRecord()">Save Changes</button>
    </div>
  </div>
</div>

<div id="shipModal" class="modal-overlay" onclick="if(event.target===this) closeShipModal()">
  <div class="modal-window">
    <button class="modal-close-x" onclick="closeShipModal()">×</button>
    <h3>Confirm Freight Dispatch</h3>
    <div class="photo-options-grid">
      <div class="photo-uploader" onclick="document.querySelector('#cameraFile').click()">📷 Take Live Photo
        <input type="file" id="cameraFile" accept="image/*" capture="environment" style="display:none" onchange="addPhotoBlob(this)" />
      </div>
      <div class="photo-uploader" onclick="document.querySelector('#uploadFile').click()">📁 File Upload
        <input type="file" id="uploadFile" multiple accept="image/*" style="display:none" onchange="addPhotoBlob(this)" />
      </div>
    </div>
    <div id="photoPreviewStrip" class="photo-strip"></div>
    <div class="modal-field"><label>SO#</label><input id="m_so" readonly /></div>
    <div class="modal-field"><label>Customer</label><input id="m_cust" readonly /></div>
    <div class="modal-field"><label>Containers</label><input id="m_qty" readonly /></div>
    <div class="modal-field"><label>Carrier</label><input id="m_carrier" placeholder="e.g. Fedex, Manitoulin, Customer Pickup" /></div>
    <div class="modal-field"><label>Location</label><input id="m_loc" readonly /></div>
    <div class="modal-field"><label>Total Weight (in lbs)</label><input id="m_weight" readonly /></div>
    <div class="modal-field"><label>Shipped By</label><input id="m_by" /></div>
    <div class="chk-row"><input type="checkbox" id="m_pm_chk" onchange="document.querySelector('#m_pm_email').disabled=!this.checked"/><label>E-mail PM Verification</label></div>
    <div class="modal-field"><input id="m_pm_email" disabled /></div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
      <button id="modalConfirmBtn" style="background:#dd4d25; color:#fff; font-weight:700; border:0; padding:10px 16px; border-radius:8px; cursor:pointer;" onclick="submitFreightDispatch()">Confirm Dispatch</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://gdrpdiwykmnybmkadlrv.supabase.co';
  const supabaseClient = supabase.createClient(SUPABASE_URL, 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnBkaXd5a21ueWJta2FkbHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjMyMTIsImV4cCI6MjA5NjA5OTIxMn0.Z7ih_vQic1GtzCyZmTEV-RWJnmuaNZQDfOV2_Fvan5g');
  let cache = []; let currentEditId = null; let activeShipTargetItem = null; let selectedPhotoBlobs = [];

  function adjustEditCount(id, amt) {
    const el = document.querySelector(`#${id}`); el.value = Math.max(0, (parseInt(el.value)||0) + amt);
  }
  function fetchBrowserGPS(targetInputId) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => { document.querySelector(`#${targetInputId}`).value = position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6); }
      );
    }
  }

  async function refresh() {
    const res = await supabaseClient.from('staging').select('*').order('entry_date', { ascending: false });
    cache = res.data || []; filter();
  }

  function filter() {
    const q = document.querySelector('#f').value.toLowerCase();
    const body = document.querySelector('#tbl tbody'); body.innerHTML = '';
    cache.filter(e => e.so.toLowerCase().includes(q) || e.customer.toLowerCase().includes(q)).forEach(e => {
      const row = document.createElement('tr');
      const geoLink = e.coords ? `<a class="coord-link" href="geo:0,0?q=${encodeURIComponent(e.coords)}" target="_blank">${e.coords}</a>` : '—';
      
      // FIX: Standard absolute text ID string routing bypasses inner string attribute quote collision errors completely
      row.innerHTML = `<td><button class="btn-del" onclick="deleteItem('${e.id}')">Delete</button></td>
        <td><button class="btn-edit" onclick="openEditPrompt('${e.id}')">Edit</button></td>
        <td><b>${e.so}</b></td><td>${e.customer}</td><td>${new Date(e.entry_date).toLocaleString()}</td><td>${e.type}</td><td>${e.location}</td><td><small>${geoLink}</small></td><td><b>${e.weight || '—'}</b></td><td>${e.status}</td><td>${e.staged_by||'—'}</td>
        <td style="position:sticky;right:0;text-align:center;"><input type="checkbox" onchange="if(this.checked) { openShipPrompt('${e.id}'); this.checked = false; }"></td>`;
      body.appendChild(row);
    });
  }

  function parseContainerString(typeStr) {
    let sk = 0, bx = 0, cr = 0; if(!typeStr) return { sk, bx, cr };
    const matchSk = typeStr.match(/(\d+)\s*Skid/); if(matchSk) sk = parseInt(matchSk[1]);
    const matchBx = typeStr.match(/(\d+)\s*Box/);  if(matchBx) bx = parseInt(matchBx[1]);
    const matchCr = typeStr.match(/(\d+)\s*Crate/);if(matchCr) cr = parseInt(matchCr[1]);
    return { sk, bx, cr };
  }

  function openEditPrompt(id) {
    const e = cache.find(x => x.id === id);
    if (!e) return;
    currentEditId = e.id;
    document.querySelector('#e_so').value = e.so; document.querySelector('#e_cust').value = e.customer;
    document.querySelector('#e_loc').value = e.location || ''; document.querySelector('#e_coords').value = e.coords || '';
    document.querySelector('#e_weight').value = e.weight || ''; document.querySelector('#e_status').value = e.status || '';
    document.querySelector('#e_staged_by').value = e.staged_by || '';
    const counts = parseContainerString(e.type);
    document.querySelector('#e_skid').value = counts.sk; document.querySelector('#e_box').value = counts.bx; document.querySelector('#e_crate').value = counts.cr;
    document.querySelector('#editModal').style.display = 'flex';
  }

  async function saveEditedRecord() {
    const sk = parseInt(document.querySelector('#e_skid').value)||0, bx = parseInt(document.querySelector('#e_box').value)||0, cr = parseInt(document.querySelector('#e_crate').value)||0;
    let typeParts = []; if(sk) typeParts.push(sk+' Skid'); if(bx) typeParts.push(bx+' Box'); if(cr) typeParts.push(cr+' Crate');
    const dynamicType = typeParts.join(', ') || '1 Skid';

    await supabaseClient.from('staging').update({
      so: document.querySelector('#e_so').value.trim(), customer: document.querySelector('#e_cust').value.trim(),
      location: document.querySelector('#e_loc').value.trim(), coords: document.querySelector('#e_coords').value.trim(), weight: document.querySelector('#e_weight').value.trim(),
      status: document.querySelector('#e_status').value.trim(), staged_by: document.querySelector('#e_staged_by').value.trim(),
      type: dynamicType, qty: sk+bx+cr
    }).eq('id', currentEditId);
    document.querySelector('#editModal').style.display = 'none'; refresh();
  }

  function openShipPrompt(id) {
    const item = cache.find(x => x.id === id);
    if (!item) return;
    activeShipTargetItem = item; selectedPhotoBlobs = []; document.querySelector('#photoPreviewStrip').innerHTML = '';
    document.querySelector('#m_so').value = item.so; document.querySelector('#m_cust').value = item.customer;
    document.querySelector('#m_qty').value = item.type; document.querySelector('#m_carrier').value = '';
    document.querySelector('#m_loc').value = item.location; document.querySelector('#m_weight').value = item.weight || '—';
    document.querySelector('#m_by').value = ''; document.querySelector('#m_pm_chk').checked = false;
    document.querySelector('#m_pm_email').disabled = true; document.querySelector('#shipModal').style.display = 'flex';
  }
  function closeShipModal() { document.querySelector('#shipModal').style.display = 'none'; refresh(); }
  function addPhotoBlob(input) {
    if(!input.files) return;
    Array.from(input.files).forEach(f => { if(selectedPhotoBlobs.length < 10) selectedPhotoBlobs.push(f); });
    const strip = document.querySelector('#photoPreviewStrip'); strip.innerHTML = '';
    selectedPhotoBlobs.forEach((f, idx) => strip.insertAdjacentHTML('beforeend', `<span class="photo-badge">📎 Img-${idx+1}</span>`));
  }

  // REVISION 2: UNIFIED DISPATCH EMAIL METRICS AND SYSTEM DOMAIN LINK SYNC
  async function submitFreightDispatch() {
    const dispatcher = document.querySelector('#m_by').value.trim(); const pmEmail = document.querySelector('#m_pm_email').value.trim(); const pmChecked = document.querySelector('#m_pm_chk').checked;
    const carrierVal = document.querySelector('#m_carrier').value.trim() || 'Unassigned Carrier';
    if(!dispatcher || (pmChecked && !pmEmail)) return alert("Missing required inputs.");
    
    document.querySelector('#modalConfirmBtn').disabled = true;
    try {
      let photoUrls = [];
      for (let i = 0; i < selectedPhotoBlobs.length; i++) {
        const file = selectedPhotoBlobs[i]; const cleanFileName = file.name.replace(/[^a-zA-Z0-9.]/g, '');
        const path = `${activeShipTargetItem.so}-${Date.now()}-${i}-${cleanFileName}`;
        await supabaseClient.storage.from('freight-photos').upload(path, file); photoUrls.push(path);
      }
      
      let pmName = pmEmail ? pmEmail.split('@')[0].split('.')[0] : null;
      if(pmName) pmName = pmName.charAt(0).toUpperCase() + pmName.slice(1);
      const currentTimeStamp = new Date().toLocaleString();

      await supabaseClient.from('shipped').insert([{ so: activeShipTargetItem.so, customer: activeShipTargetItem.customer, type: activeShipTargetItem.type, qty: activeShipTargetItem.qty, carrier: carrierVal, location: activeShipTargetItem.location, coords: activeShipTargetItem.coords, weight: activeShipTargetItem.weight, shipped_by: dispatcher, pmd_email: pmName, photo_urls: photoUrls }]);
      await supabaseClient.from('staging').delete().eq('id', activeShipTargetItem.id);
      
      const cachedSubject = `CONFIRMATION OF SHIPOUT: ${activeShipTargetItem.customer} ${activeShipTargetItem.so} @ ${activeShipTargetItem.type} via ${carrierVal}`;
      const cachedBody = `Your order has now been shipped! Order details:\n\n` +
        `----------------------------------------------------------------------\n` +
        `SO#                   | ${activeShipTargetItem.so}\n` +
        `Customer              | ${activeShipTargetItem.customer}\n` +
        `Container(s)          | ${activeShipTargetItem.type}\n` +
        `Total Weight (In lbs) | ${activeShipTargetItem.weight || '—'}\n` +
        `Carrier               | ${carrierVal}\n` +
        `Shipped At            | ${currentTimeStamp}\n` +
        `Shipped By            | ${dispatcher}\n` +
        `----------------------------------------------------------------------\n\n` +
        `For more shipment details, visit the following link: https://swiftoperations.github.io/staging-tracker/\n\n` +
        `Thanks\n`;

      closeShipModal();
      if(pmChecked) { window.location.href = `mailto:${pmEmail}?subject=${encodeURIComponent(cachedSubject)}&body=${encodeURIComponent(cachedBody)}`; }
    } catch(e) { alert("Dispatch error."); } finally { document.querySelector('#modalConfirmBtn').disabled = false; }
  }

  async function deleteItem(id) { if(confirm("Permanently delete item?")) { await supabaseClient.from('staging').delete().eq('id', id); refresh(); } }
  window.onload = () => { refresh(); setInterval(refresh, 5000); };
</script>
</body>
</html>
