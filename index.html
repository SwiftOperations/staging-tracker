<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Swift Staging Tracker — v2.65</title>
<style>
  :root{--brand:#dd4d25;}
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f6f7f9;color:#222}
  .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
  h1{font-weight:700;margin:0 0 6px}
  .muted{color:#667085;font-size:14px;margin:0 0 18px}
  .grid{display:grid;gap:12px;grid-template-columns:repeat(6,minmax(0,1fr))}
  .tile{background:#fff;border:1px solid #e6e7eb;border-radius:10px;padding:14px}
  .tile h4{margin:0 0 8px;color:#6b7280;font-size:13px}
  .big{font-size:22px;font-weight:700}
  .card{background:#fff;border:1px solid #e6e7eb;border-radius:12px;padding:14px;margin:14px 0}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  input,select{height:42px;padding:0 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;width:100%}
  input.uppercase{text-transform: uppercase;}
  .row > *{flex:1 1 170px}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:760px}
  thead th{position:sticky;top:0;background:#fff;border-bottom:1px solid #e6e7eb;font-size:14px;text-align:left;padding:10px}
  tbody td{border-bottom:1px solid #f0f1f3;padding:10px;vertical-align:top}
  .tblwrap{overflow:auto;border:1px solid #e6e7eb;border-radius:12px}
  .split{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .notice{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;padding:10px;margin:10px 0}
  @media (max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app-container" class="wrap">
  <h1>Swift Staging Tracker — v2.65</h1>
  <div id="err" class="notice" style="display:none"></div>

  <div class="grid">
    <div class="tile"><h4>Orders</h4><div id="kOrders"
