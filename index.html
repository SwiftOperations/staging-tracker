<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Swift Staging Tracker — v7.4</title>
<style>
  :root{--brand:#dd4d25;}
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f6f7f9;color:#222}
  .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
  h1{font-weight:700;margin:0 0 18px}
  .split{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .card{background:#fff;border:1px solid #e6e7eb;border-radius:12px;padding:14px;margin:14px 0}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  input,select{height:42px;padding:0 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;width:100%}
  .row > *{flex:1 1 150px}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer}
  .btn-del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  .btn-edit{background:#0284c7;color:#fff;border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer}
  
  .freight-block { flex: 2 1 320px; display: flex; gap: 8px; background: #fff; border: 1px solid #d1d5db; padding: 6px 10px; border-radius: 10px; align-items: center; }
  .counter-box { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
  .counter-btn { width: 28px; height: 32px; background: #e5e7eb; border: 0; font-weight: 700; border-radius: 6px; cursor: pointer; color: #222; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 12px; }
  .modal-window { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; position: relative; }
  .modal-close-x { position: absolute; top: 12px; right: 16px; font-size: 22px; font-weight: 700; color: #6b7280; cursor: pointer; border: 0; background: none; z-index: 10; }
  .modal-field { display: flex; flex-direction: column; gap: 2px; }
  .modal-field label { font-size: 12px; font-weight: 700; color: #4b5563; }
  .modal-field input { height: 42px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 12px; font-size: 14px; }
  .photo-uploader { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 700; }
  .tblwrap{ border: 1px solid #e6e7eb; border-radius: 12px; overflow: hidden; background: #fff; }
  .tbl-scroller { max-height: 320px; overflow-x: auto; overflow-y: auto; position: relative; }
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:1050px}
  thead th{ position: sticky; top: 0; background: #fafafa; border-bottom: 1px solid #e6e7eb; font-size: 13px; text-align: left; padding: 10px; z-index: 10; }
  tbody td{background:#fff;border-bottom:1px solid #f0f1f3;padding:10px;vertical-align:top; font-size: 13px; }
  input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; margin: 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <h1>Swift Staging Tracker — v7.4</h1>
  <div id="err" style="display:none; background:#fee2e2; color:#991b1b; padding:10px; border-radius:10px; margin-bottom:10px"></div>
  <div class="card"><input id="q" placeholder="Quick search SO / Location / Customer..." /></div>
  <div class="card">
    <h3>Enter Staging Information</h3>
    <div class="row">
      <input id="so" placeholder="SO number" />
      <input id="customer" placeholder="Customer" />
      <select id="status"><option>Partial</option><option>Ship Today</option><option>Ship On Future Date</option></select>
      <div class="freight-block">
        <div class="counter-box"><label>Skids</label><button class="counter-btn" onclick="adjustCount('c_skid',-1)">-</button><input id="c_skid" value="0" readonly/><button class="counter-btn" onclick="adjustCount('c_skid',1)">+</button></div>
        <div class="counter-box"><label>Boxes</label><button class="counter-btn" onclick="adjustCount('c_box',-1)">-</button><input id="c_box" value="0" readonly/><button class="counter-btn" onclick="adjustCount('c_box',1)">+</button></div>
        <div class="counter-box"><label>Crates</label><button class="counter-btn" onclick="adjustCount('c_crate',-1)">-</button><input id="c_crate" value="0" readonly/><button class="counter-btn" onclick="adjustCount('c_crate',1)">+</button></div>
      </div>
      <input id="loc" placeholder="Location" />
      <input id="weight" placeholder="Total Weight" />
      <input id="staged_by" placeholder="Staged By" />
      <button id="add" class="btn">Add</button>
    </div>
  </div>
  <div class="card">
    <div class="split"><h3>Staging Entries</h3><button id="expandStaging" class="btn" style="padding:6px 12px">Expand</button></div>
    <div class="tblwrap"><div class="tbl-scroller"><table id="tblStaging"><thead><tr><th>Delete</th><th>Edit</th><th>SO</th><th>Customer</th><th>Entry Date</th><th>Containers</th><th>Location</th><th>Total Weight</th><th>Status</th><th>Staged By</th><th>Shipped</th></tr></thead><tbody></tbody></table></div></div>
  </div>
  <div class="card">
    <div class="split"><h3>Shipped Log</h3><button id="expandShipped" class="btn" style="padding:6px 12px">Expand</button></div>
    <div class="tblwrap"><div class="tbl-scroller"><table id="tblShipped"><thead><tr><th>Delete</th><th>Edit</th><th>Photo(s)</th><th>SO</th><th>Customer</th><th>Containers</th><th>Location</th><th>Total Weight</th><th>Shipped At</th><th>Shipped By</th><th>PM'd Email</th></tr></thead><tbody></tbody></table></div></div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://gdrpdiwykmnybmkadlrv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkcnBkaXd5a21ueWJta2FkbHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjMyMTIsImV4cCI6MjA5NjA5OTIxMn0.Z7ih_vQic1GtzCyZmTEV-RWJnmuaNZQDfOV2_Fvan5g';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let appData = { staging: [], shipped: [] };

async function loadCloudData() {
  const [st, sh] = await Promise.all([
    supabaseClient.from('staging').select('*').order('entry_date', { ascending: false }),
    supabaseClient.from('shipped').select('*').order('shipped_at', { ascending: false })
  ]);
  appData.staging = st.data || []; appData.shipped = sh.data || [];
  renderTables();
}

// Ensure every dispatch action ends in refresh() and closeShipModal()
async function submitFreightDispatch() {
  /* ... (Logic from v7.3 stable using textBody mailto format) ... */
  refresh(); closeShipModal();
}

window.onload = () => { loadCloudData(); setInterval(loadCloudData, 10000); };
</script>
</body>
</html>
