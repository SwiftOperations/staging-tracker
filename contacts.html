<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Swift Staging Tracker - Contacts Directory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css?v=1.4" />
<style>
  .batch-mode-only { display: none; }
  body.batch-mode .batch-mode-only { display: inline-block; }
  body.batch-mode .hide-in-batch { display: none !important; }
  .batch-checkbox { width: 18px; height: 18px; cursor: pointer; }
</style>
</head>
<body>

<div class="wrap">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:12px;">
    <div class="dropdown">
      <button class="hamburger-btn" onclick="window.toggleMenu(event)">☰</button>
      <div class="dropdown-content">
        <a href="index.html"><b>Index</b> (Dashboard)</a>
        <a href="stage.html" class="indented">↳ Staging Entries Log</a>
        <a href="ship.html" class="indented">↳ Shipped Log</a>
        <a href="reports.html"><b>Reports</b></a>
        <a href="notifications.html"><b>Notifications</b></a>
        <a href="contacts.html"><b>Contacts</b></a>
      </div>
    </div>
    <h2 style="margin:0; flex: 1 1 auto;">Contacts Directory</h2>
    
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn hide-in-batch" style="background:#64748b; padding:8px 14px;" onclick="toggleContactBatchMode()">Batch Actions</button>
      
      <!-- Batch Mode Controls -->
      <button class="btn batch-mode-only" style="background:#3b82f6; padding:8px 14px;" onclick="contactBatchSelectAll()">Select All</button>
      <button class="btn batch-mode-only" style="background:#64748b; padding:8px 14px;" onclick="contactBatchUnselectAll()">Clear</button>
      <button class="btn batch-mode-only" style="background:#10b981; padding:8px 14px;" onclick="contactBatchExport()">Export CSV</button>
      <button class="btn batch-mode-only" style="background:#dc2626; padding:8px 14px;" onclick="contactBatchDelete()">Delete</button>
      <button class="btn batch-mode-only" style="background:#94a3b8; padding:8px 14px;" onclick="toggleContactBatchMode()">Cancel</button>
    </div>
  </div>

  <div class="card" style="margin-top:0;">
    <div class="split"><h3>Employee Directory</h3></div>
    <p style="color:#64748b; font-size: 13px; margin-top: 0; margin-bottom: 12px;">Browse, search, and export employee contact information across all branches.</p>
    
    <input type="text" id="contactSearch" placeholder="Search by name, branch, or designation..." style="width: 100%; margin-bottom: 16px; border-radius: 8px;" onkeyup="renderContactsTable()" />

    <div class="tblwrap">
      <div class="tbl-scroller" style="max-height: calc(100vh - 250px);">
        <table id="tblContacts">
          <thead>
            <tr>
              <th class="batch-mode-only" style="width:40px; text-align:center;">✓</th>
              <th>Name</th>
              <th>Designation</th>
              <th>Branch</th>
              <th>Email</th>
              <th>Ext.</th>
              <th>Direct</th>
              <th>Mobile</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="employees.js?v=2.5"></script>
<script src="config.js?v=2.5"></script>
<script src="auth.js?v=2.5"></script>
<script src="ui.js?v=2.5"></script>
<script src="history.js?v=2.5"></script>
<script src="split.js?v=2.5"></script>
<script src="reports.js?v=2.5"></script>
<script src="operations.js?v=2.5"></script>
<script src="batch.js?v=2.5"></script>
<script src="media.js?v=2.5"></script>
<script src="app.js?v=2.5"></script>

<script>
  // Inject the parsed CSV data
  
  let contactBatchSelected = new Set();
  let contactBatchMode = false;

  function toggleContactBatchMode() {
    contactBatchMode = !contactBatchMode;
    contactBatchSelected.clear();
    document.body.classList.toggle('batch-mode', contactBatchMode);
    renderContactsTable();
  }

  function toggleContactCheck(idx, isChecked) {
    if (isChecked) contactBatchSelected.add(idx);
    else contactBatchSelected.delete(idx);
  }

  function contactBatchSelectAll() {
    const term = (document.getElementById('contactSearch').value || '').toLowerCase();
    rawContactsData.forEach((c, idx) => {
      const match = c.name.toLowerCase().includes(term) || c.branch.toLowerCase().includes(term) || c.designation.toLowerCase().includes(term);
      if (match) contactBatchSelected.add(idx);
    });
    renderContactsTable();
  }

  function contactBatchUnselectAll() {
    contactBatchSelected.clear();
    renderContactsTable();
  }

  function contactBatchDelete() {
    if (contactBatchSelected.size === 0) return alert("Select at least one contact to delete.");
    if (!confirm(`Are you sure you want to remove ${contactBatchSelected.size} selected contacts?`)) return;
    
    // Convert Set to Array and sort descending so splicing doesn't mess up indices
    const indicesToRemove = Array.from(contactBatchSelected).sort((a,b) => b - a);
    indicesToRemove.forEach(idx => {
      rawContactsData.splice(idx, 1);
    });
    
    contactBatchSelected.clear();
    renderContactsTable();
    if(typeof window.showNotification === 'function') window.showNotification('Contacts Deleted');
  }

  function contactBatchExport() {
    if (contactBatchSelected.size === 0) return alert("Select at least one contact to export.");
    
    const indices = Array.from(contactBatchSelected).sort((a,b) => a - b);
    let csvContent = "Name,Designation,Branch,Email,Ext,Direct,Mobile\n";
    
    indices.forEach(idx => {
      const c = rawContactsData[idx];
      const row = `"${c.name}","${c.designation}","${c.branch}","${c.email}","${c.ext}","${c.direct}","${c.mobile}"`;
      csvContent += row + "\n";
    });

    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "Swift_Contacts_Export.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    if(typeof window.showNotification === 'function') window.showNotification('Contacts Exported');
    toggleContactBatchMode(); // Return to normal mode after export
  }

  function renderContactsTable() {
    const tbody = document.querySelector('#tblContacts tbody');
    if(!tbody) return;
    
    const term = (document.getElementById('contactSearch').value || '').toLowerCase();
    let html = '';

    rawContactsData.forEach((c, idx) => {
      const match = c.name.toLowerCase().includes(term) || c.branch.toLowerCase().includes(term) || c.designation.toLowerCase().includes(term);
      if(!match) return;

      const checked = contactBatchSelected.has(idx) ? 'checked' : '';
      
      html += `
        <tr style="border-bottom: 1px solid #f0f1f3;">
          <td class="batch-mode-only" style="text-align:center;">
            <input type="checkbox" class="batch-checkbox" ${checked} onchange="toggleContactCheck(${idx}, this.checked)" />
          </td>
          <td style="font-weight:600; color:#0f172a;">${c.name}</td>
          <td style="color:#475569;">${c.designation}</td>
          <td><span style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:6px; font-size:12px; font-weight:700;">${c.branch}</span></td>
          <td><a href="mailto:${c.email}" style="color:#0ea5e9; text-decoration:none;">${c.email}</a></td>
          <td>${c.ext}</td>
          <td>${c.direct}</td>
          <td>${c.mobile}</td>
        </tr>
      `;
    });

    if(html === '') html = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#64748b;">No contacts found matching your search.</td></tr>';
    tbody.innerHTML = html;
  }

  // Initial render when DOM is ready
  document.addEventListener('DOMContentLoaded', renderContactsTable);
</script>
</body>
</html>
